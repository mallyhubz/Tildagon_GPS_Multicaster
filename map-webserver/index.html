<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>UDP Map Plot</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<style>
  body { margin:0; }
  #map { width:100vw; height:100vh; }
</style>
</head>

<body>
<div id="map"></div>

<script>
const map = L.map("map").setView([52.0413891, -2.3775744], 25); // UK-ish default

L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
    maxZoom: 19,
    attribution: "© OpenStreetMap"
}).addTo(map);

const markers = new Map();

// --- WebSocket to Node server ---
const ws = new WebSocket("ws://" + location.host);

ws.onmessage = (event) => {
    const { label, lat, lon } = JSON.parse(event.data);

    if (markers.has(label)) {
        markers.get(label).setLatLng([lat, lon]);
    } else {
        const m = L.marker([lat, lon]).addTo(map).bindPopup(label);
        markers.set(label, m);
    }
};
</script>
</body>
</html>
